version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cabinet_postgres
    environment:
      POSTGRES_DB: cabinet_medical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cabinet_net

  minio:
    image: minio/minio:latest
    container_name: cabinet_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - cabinet_net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: cabinet_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - cabinet_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cabinet_backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/cabinet_medical?schema=public
      JWT_SECRET: change-me-in-production-super-secret-key
      JWT_REFRESH_SECRET: change-me-refresh-secret
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: cabinet-medical
      MINIO_USE_SSL: "false"
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      EMAIL_FROM: cabinet@example.ma
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - cabinet_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cabinet_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cabinet_net
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  cabinet_net:
    driver: bridge
