version: '3.9'

# Compose de développement — uniquement les services d'infrastructure
# Le backend et frontend tournent en local (npm run start:dev / npm run dev)

services:
  postgres:
    image: postgres:16-alpine
    container_name: cabinet_postgres_dev
    environment:
      POSTGRES_DB: cabinet_medical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: cabinet_minio_dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_dev_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  mailhog:
    image: mailhog/mailhog:latest
    container_name: cabinet_mailhog_dev
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_dev_data:
  minio_dev_data:
