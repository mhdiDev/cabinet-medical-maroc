name: CI — Cabinet Médical

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cabinet_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer dépendances backend
        working-directory: backend
        run: npm ci

      - name: Générer client Prisma
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/cabinet_test

      - name: Migrer base de données test
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/cabinet_test

      - name: Linter backend
        working-directory: backend
        run: npm run lint

      - name: Tests unitaires backend
        working-directory: backend
        run: npm run test -- --coverage
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/cabinet_test
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

      - name: Upload couverture
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
        working-directory: backend

      - run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/cabinet_medical

      - run: npm run build
        working-directory: backend

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer dépendances frontend
        working-directory: frontend
        run: npm ci

      - name: Linter frontend
        working-directory: frontend
        run: npm run lint

      - name: Tests frontend
        working-directory: frontend
        run: npm test -- --passWithNoTests

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build images Docker
        run: docker compose -f docker-compose.yml build
