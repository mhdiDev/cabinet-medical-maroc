name: CI — Cabinet Médical

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    name: Tests unitaires (Jest mocks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer dépendances backend
        working-directory: backend
        run: npm ci

      - name: Générer client Prisma
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/cabinet_test

      - name: Tests unitaires
        working-directory: backend
        run: npm test -- --coverage
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/cabinet_test
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

  api-tests:
    name: Tests API (Supertest + PostgreSQL)
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cabinet_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer dépendances backend
        working-directory: backend
        run: npm ci

      - name: Générer client Prisma
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/cabinet_test

      - name: Migrer base de données test
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/cabinet_test

      - name: Tests API
        working-directory: backend
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/cabinet_test
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

  frontend-lint:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer dépendances frontend
        working-directory: frontend
        run: npm ci

      - name: Linter frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [api-tests, frontend-lint]
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Build image Docker backend
        run: docker build -f backend/Dockerfile backend/
